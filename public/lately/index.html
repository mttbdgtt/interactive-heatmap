<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lately</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow-x: hidden;
      overflow-y: scroll;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar { display: none; }

    body {
      width: 100%;
      min-height: 100%;
      background: #f0ece4;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Fixed logo — always on top of everything ── */
    #site-logo {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      pointer-events: all;
      cursor: pointer;
    }

    #site-logo svg {
      display: block;
      height: 70px;
      width: auto;
    }

    /* ── Header ── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    #header-contact,
    #menu-btn {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      pointer-events: all;
    }

    /* ── Menu Overlay ── */
    #menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 350;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px 32px 32px;
      opacity: 0;
      pointer-events: none;
    }

    #menu-overlay.is-open { pointer-events: all; }

    #menu-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #menu-contact,
    #menu-close {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
    }

    #menu-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex: 1;
    }

    .menu-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-col-right { text-align: right; }

    .menu-link {
      font-size: clamp(52px, 7vw, 90px);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 400;
      color: #111;
      text-decoration: none;
      line-height: 1.15;
      display: block;
      opacity: 0;
    }

    .menu-link {
      display: inline-block;
    }

    .menu-link::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 4px;
      background: #e85a3c;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .menu-col-right .menu-link::after {
      left: auto;
      right: 0;
    }

    .menu-link:hover::after { width: 100%; }
    .menu-col-left  .menu-link { transform: translateX(-60px); }
    .menu-col-right .menu-link { transform: translateX(60px); }

    #menu-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #menu-bottom a {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      opacity: 0;
    }

    #menu-bottom a:hover { opacity: 0.4 !important; }

    /* ── Board ── */
    #board-track { width: 100%; }

    .board-screen {
      width: 100%;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: start;
    }

    .board-screen.first { padding-top: 80px; }

    .board-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .img-wrap {
      width: 100%;
      cursor: grab;
      transform-origin: center center;
      will-change: transform;
      opacity: 0;
      position: relative;
      touch-action: none;
    }

    .img-wrap.is-dragging { cursor: grabbing; z-index: 999; }

    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    @media (max-width: 768px) {
      .board-screen { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <a href="#" id="header-contact">CONTACT</a>

<!-- Fullscreen Menu Overlay -->
<div id="menu-overlay">

<div id="board-track"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // YOUR IMAGES — put your files in an images/ folder next to index.html
  // ─────────────────────────────────────────────────────────────────────────
  const IMAGES = [
    'images/photo-01.jpg',
    'images/photo-02.jpg',
    'images/photo-03.jpg',
    'images/photo-04.jpg',
    'images/photo-05.jpg',
    'images/photo-06.jpg',
    'images/photo-07.jpg',
    'images/photo-08.jpg',
    'images/photo-09.jpg',
    'images/photo-10.jpg',
    'images/photo-11.jpg',
    'images/photo-12.jpg',
    'images/photo-13.jpg',
    'images/photo-14.jpg',
    'images/photo-15.jpg',
    'images/photo-16.jpg',
    'images/photo-17.jpg',
    'images/photo-18.jpg',
    'images/photo-19.jpg',
    'images/photo-20.jpg',
  ];
  // ─────────────────────────────────────────────────────────────────────────

  gsap.registerPlugin(ScrollTrigger, Draggable);

  const track = document.getElementById('board-track');
  let screenCount = 0;

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function initInteraction(wrap) {
    let rotateInterval = null;
    let rotateDirection = 1;
    let velX = 0, velY = 0;
    let lastX = 0, lastY = 0;
    let lastTime = 0;

    Draggable.create(wrap, {
      type: 'x,y',
      zIndexBoost: true,
      allowNativeTouchScrolling: false,
      onPress() {
        wrap.classList.add('is-dragging');
        rotateDirection *= -1;
        gsap.to(wrap, { scale: 1.08, duration: 0.2, ease: 'power2.out' });

        rotateInterval = setInterval(() => {
          const currentRot = parseFloat(wrap.dataset.rot) || 0;
          const nextRot = currentRot + (rotateDirection * 3);
          wrap.dataset.rot = nextRot;
          gsap.to(wrap, { rotate: nextRot, duration: 0.1, ease: 'none', overwrite: true });
        }, 30);

        lastX = this.pointerX;
        lastY = this.pointerY;
        lastTime = Date.now();
        velX = 0; velY = 0;
      },
      onDrag() {
        const now = Date.now();
        const dt = now - lastTime || 16;
        velX = (this.pointerX - lastX) / dt * 16;
        velY = (this.pointerY - lastY) / dt * 16;
        lastX = this.pointerX;
        lastY = this.pointerY;
        lastTime = now;
      },
      onRelease() {
        wrap.classList.remove('is-dragging');
        if (rotateInterval) { clearInterval(rotateInterval); rotateInterval = null; }
        const currentRot = parseFloat(wrap.dataset.rot) || 0;
        gsap.to(wrap, { scale: 1, rotate: currentRot, duration: 0.35, ease: 'power2.out' });

        const currentX = gsap.getProperty(wrap, 'x');
        const currentY = gsap.getProperty(wrap, 'y');
        gsap.to(wrap, {
          x: currentX + velX * 12,
          y: currentY + velY * 12,
          duration: 0.8,
          ease: 'power3.out'
        });
      }
    });
  }

  function buildScreen() {
    const isFirst = screenCount === 0;
    screenCount++;

    const screen = document.createElement('div');
    screen.className = isFirst ? 'board-screen first' : 'board-screen';

    const cols = [0, 1, 2, 3].map(() => {
      const col = document.createElement('div');
      col.className = 'board-col';
      screen.appendChild(col);
      return col;
    });

    shuffle(IMAGES).forEach((src, i) => {
      const col = cols[i % 4];
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';

      const rot = rand(-18, 18);
      wrap.dataset.rot = rot;

      gsap.set(wrap, {
        rotate: rot,
        xPercent: rand(-30, 30),
        yPercent: rand(-30, 30),
        opacity: 0
      });

      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      img.loading = isFirst ? 'eager' : 'lazy';
      img.onload = () => ScrollTrigger.refresh();
      wrap.appendChild(img);

      initInteraction(wrap);
      col.appendChild(wrap);
    });

    track.appendChild(screen);

    if (isFirst) {
      gsap.to(screen.querySelectorAll('.img-wrap'), {
        opacity: 1, duration: 0.6, stagger: 0.04, ease: 'power1.out', delay: 0.1
      });
    } else {
      ScrollTrigger.create({
        trigger: screen,
        start: 'top 90%',
        onEnter: () => {
          gsap.to(screen.querySelectorAll('.img-wrap'), {
            opacity: 1, duration: 0.5, stagger: 0.03, ease: 'power1.out'
          });
        },
        once: true
      });
    }
  }

  buildScreen();
  buildScreen();
  buildScreen();

  function checkScroll() {
    const scrollBottom = window.scrollY + window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    if (scrollBottom > docHeight - window.innerHeight * 1.5) {
      buildScreen();
      ScrollTrigger.refresh();
    }
  }

  function ensureScrollable() {
    checkScroll();
    if (document.documentElement.scrollHeight <= window.innerHeight + 100) {
      setTimeout(ensureScrollable, 300);
    }
  }

  window.addEventListener('load', ensureScrollable);
  window.addEventListener('scroll', checkScroll, { passive: true });

  // ── Menu ──────────────────────────────────────────────────────────────────
  const overlay    = document.getElementById('menu-overlay');
  const menuBtn    = document.getElementById('menu-btn');
  const closeBtn   = document.getElementById('menu-close');
  const leftLinks  = document.querySelectorAll('.menu-col-left .menu-link');
  const rightLinks = document.querySelectorAll('.menu-col-right .menu-link');
  const btmLinks   = document.querySelectorAll('#menu-bottom a');

  const headerContact = document.getElementById('header-contact');

  function resetImageZIndex() {
    document.querySelectorAll('.img-wrap').forEach(w => w.style.zIndex = '');
  }

  function openMenu() {
    resetImageZIndex();
    overlay.classList.add('is-open');
    const tl = gsap.timeline();
    tl.to([headerContact, menuBtn], { opacity: 0, duration: 0.15, ease: 'power1.in' })
    tl.to(overlay,    { opacity: 1, duration: 0.4, ease: 'power2.out' }, '-=0.05')
    tl.to(leftLinks,  { opacity: 1, x: 0, duration: 0.5, stagger: 0.07, ease: 'power3.out' }, '-=0.2')
    tl.to(rightLinks, { opacity: 1, x: 0, duration: 0.5, stagger: 0.07, ease: 'power3.out' }, '<')
    tl.to(btmLinks,   { opacity: 1, duration: 0.3, stagger: 0.05, ease: 'power1.out' }, '-=0.2');
  }

  function closeMenu() {
    const tl = gsap.timeline({
      onComplete: () => overlay.classList.remove('is-open')
    });
    tl.to([leftLinks, rightLinks, btmLinks], { opacity: 0, duration: 0.2, ease: 'power1.in' })
    tl.to(leftLinks,  { x: -60, duration: 0 })
    tl.to(rightLinks, { x:  60, duration: 0 })
    tl.to(overlay, { opacity: 0, duration: 0.3, ease: 'power2.in' }, '-=0.1')
    tl.to([headerContact, menuBtn], { opacity: 1, duration: 0.2, ease: 'power1.out' });
  }

  document.getElementById('site-logo').addEventListener('click', () => {
    if (overlay.classList.contains('is-open')) {
      resetImageZIndex();
      closeMenu();
    }
  });

  menuBtn.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('is-open')) closeMenu();
  });
</script>

</body>
